<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>線上預約 — 濟興堂推拿整復所</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede8;
    --text: #1a1a18; --text2: #6b6b67; --text3: #a0a09c;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --accent: #1a1a18; --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333330;
      --text: #f0efe8; --text2: #a0a09a; --text3: #6a6a65;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }

  .header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 16px 20px; text-align: center; }
  .header h1 { font-size: 18px; font-weight: 500; margin-bottom: 2px; }
  .header p { font-size: 13px; color: var(--text2); }

  .wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }

  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text2); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 14px; }

  /* 日曆 */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-header span { font-size: 15px; font-weight: 500; }
  .cal-nav { background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 6px 14px; cursor: pointer; font-size: 16px; color: var(--text); min-height: 36px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-label { text-align: center; font-size: 11px; color: var(--text2); padding: 4px 0; font-weight: 500; }
  .cal-day { text-align: center; padding: 10px 4px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; border: 0.5px solid transparent; transition: all 0.12s; min-height: 40px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 2px; }
  .cal-day:hover:not(.disabled):not(.past) { background: var(--bg2); }
  .cal-day.today { border-color: var(--border2); font-weight: 500; }
  .cal-day.selected { background: var(--text); color: var(--bg); }
  .cal-day.other-month { color: var(--text3); }
  .cal-day.past { color: var(--text3); cursor: not-allowed; }
  .cal-day.has-slots::after { content: ''; display: block; width: 5px; height: 5px; border-radius: 50%; background: #3b6d11; }
  .cal-day.selected.has-slots::after { background: var(--bg); }
  .cal-day.full::after { content: ''; display: block; width: 5px; height: 5px; border-radius: 50%; background: #a32d2d; }

  /* 時段選擇 */
  .slots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .slot { padding: 12px 8px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); text-align: center; cursor: pointer; font-size: 14px; transition: all 0.12s; background: var(--bg2); color: var(--text); }
  .slot:hover { border-color: var(--text); }
  .slot.selected { background: var(--text); color: var(--bg); border-color: var(--text); }
  .slot.full { background: var(--bg3); color: var(--text3); cursor: not-allowed; text-decoration: line-through; }
  .slot-remaining { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .slot.selected .slot-remaining { color: rgba(255,255,255,0.6); }

  /* 表單 */
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-group label { font-size: 13px; color: var(--text2); }
  input { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 16px; color: var(--text); font-family: inherit; outline: none; transition: border-color 0.15s; width: 100%; -webkit-appearance: none; }
  input:focus { border-color: var(--text); }

  .btn-submit { width: 100%; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 16px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.15s; min-height: 50px; }
  .btn-submit:hover { opacity: 0.85; }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  .empty-slots { text-align: center; padding: 1.5rem; color: var(--text2); font-size: 14px; }
  .select-date-hint { text-align: center; padding: 1.5rem; color: var(--text3); font-size: 14px; }

  /* 成功畫面 */
  .success-screen { text-align: center; padding: 2rem 1rem; }
  .success-icon { width: 60px; height: 60px; background: #eaf3de; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
  .success-icon svg { width: 30px; height: 30px; stroke: #3b6d11; }
  .success-title { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
  .success-detail { background: var(--bg2); border-radius: var(--radius-sm); padding: 14px; margin: 16px 0; text-align: left; }
  .success-row { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; }
  .success-label { color: var(--text2); }
  .btn-again { background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 24px; font-size: 14px; cursor: pointer; color: var(--text); font-family: inherit; margin-top: 8px; }

  .msg-err { color: #a32d2d; font-size: 13px; margin-top: 8px; text-align: center; }
  .loading-text { text-align: center; color: var(--text2); font-size: 13px; padding: 1rem; }
  .init-loading { position: fixed; top:0; left:0; right:0; bottom:0; background: var(--bg3); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; gap:16px; }
  .init-spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .init-loading p { font-size: 14px; color: var(--text2); }

  /* 頁籤切換 */
  .page-tabs { display: flex; background: var(--bg); border-bottom: 0.5px solid var(--border); }
  .page-tab { flex: 1; padding: 14px; text-align: center; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; transition: all 0.15s; }
  .page-tab.active { color: var(--text); border-bottom-color: var(--text); }

  /* 取消預約 */
  .cancel-apt-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
  .cancel-apt-item:last-child { border-bottom: none; }
  .cancel-apt-info { font-size: 14px; line-height: 1.6; }
  .cancel-apt-info .apt-datetime { font-weight: 500; color: var(--text); }
  .cancel-apt-info .apt-phone { font-size: 12px; color: var(--text3); }
  .btn-cancel-apt { background: transparent; border: 0.5px solid #a32d2d; border-radius: var(--radius-sm); padding: 8px 14px; font-size: 13px; color: #a32d2d; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; }
  .btn-cancel-apt:hover { background: #a32d2d; color: #fff; }
  .btn-cancel-apt:disabled { opacity: 0.4; cursor: not-allowed; }
  .cancel-success { text-align: center; padding: 1.5rem 1rem; }
  .cancel-success-icon { width: 52px; height: 52px; background: #fdecea; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 24px; }
  .btn-search { background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-sm); padding: 12px 20px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; white-space: nowrap; transition: opacity 0.15s; }
  .btn-search:hover { opacity: 0.85; }
  .search-row { display: flex; gap: 8px; align-items: stretch; }
</style>
</head>
<body>

<!-- 載入畫面 -->
<div class="init-loading" id="init-loading">
  <div class="init-spinner"></div>
  <p>載入中，請稍候...</p>
</div>

<div class="header">
  <h1>濟興堂推拿整復所</h1>
  <p>線上預約系統</p>
</div>

<!-- 頁籤 -->
<div class="page-tabs">
  <div class="page-tab active" id="tab-book" onclick="switchPage('book')">新增預約</div>
  <div class="page-tab" id="tab-cancel" onclick="switchPage('cancel')">查詢/取消預約</div>
</div>

<div class="wrap" id="main-screen">

  <!-- 步驟一：選日期 -->
  <div class="card">
    <div class="card-title">選擇日期</div>
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <span id="cal-title"></span>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-label">一</div><div class="cal-label">二</div>
      <div class="cal-label">三</div><div class="cal-label">四</div>
      <div class="cal-label">五</div><div class="cal-label">六</div>
      <div class="cal-label">日</div>
    </div>
    <div class="cal-grid" id="cal-body"></div>
  </div>

  <!-- 步驟二：選時段 -->
  <div class="card" id="slot-card">
    <div class="card-title" id="slot-title">選擇時段</div>
    <div id="slot-list"><div class="select-date-hint">請先選擇日期</div></div>
  </div>

  <!-- 步驟三：填資料 -->
  <div class="card" id="form-card" style="display:none;">
    <div class="card-title">填寫預約資料</div>
    <div class="form-group">
      <label>姓名 *</label>
      <input type="text" id="book-name" placeholder="請輸入姓名" />
    </div>
    <div class="form-group">
      <label>電話 *</label>
      <input type="tel" id="book-phone" placeholder="請輸入電話號碼" />
    </div>
    <div id="booking-summary" style="background:var(--bg2);border-radius:var(--radius-sm);padding:12px;margin-bottom:14px;font-size:13px;color:var(--text2);"></div>
    <button class="btn-submit" id="btn-submit" onclick="submitBooking()">確認預約</button>
    <div id="submit-msg"></div>
  </div>

</div>

<!-- 取消預約頁面 -->
<div class="wrap" id="cancel-screen" style="display:none;">
  <div class="card">
    <div class="card-title">查詢預約</div>
    <div class="form-group" style="margin-bottom:0;">
      <label>輸入預約時使用的電話號碼</label>
      <div class="search-row" style="margin-top:6px;">
        <input type="tel" id="cancel-phone" placeholder="請輸入電話號碼" style="flex:1;" onkeydown="if(event.key==='Enter')searchBookings()" />
        <button class="btn-search" onclick="searchBookings()">查詢</button>
      </div>
    </div>
    <div id="cancel-msg" class="msg-err" style="margin-top:8px;"></div>
  </div>
  <div class="card" id="cancel-result-card" style="display:none;">
    <div class="card-title" id="cancel-result-title">查詢結果</div>
    <div id="cancel-result-list"></div>
  </div>
</div>

<!-- 取消成功畫面 -->
<div class="wrap" id="cancel-success-screen" style="display:none;">
  <div class="card">
    <div class="cancel-success">
      <div class="cancel-success-icon">✓</div>
      <div class="success-title">預約已取消</div>
      <p style="font-size:14px;color:var(--text2);margin:8px 0 20px;">您的預約已成功取消</p>
      <div class="success-detail" id="cancel-success-detail"></div>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button class="btn-again" onclick="backToCancel()" style="flex:1;">再查詢</button>
        <button class="btn-again" onclick="resetBooking()" style="flex:1;">重新預約</button>
      </div>
    </div>
  </div>
</div>

<!-- 新增預約成功畫面 -->
<div class="wrap" id="success-screen" style="display:none;">
  <div class="card">
    <div class="success-screen">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <div class="success-title">預約成功！</div>
      <p style="font-size:14px;color:var(--text2);margin-bottom:8px;">我們已收到您的預約，請準時到診</p>
      <div class="success-detail">
        <div class="success-row"><span class="success-label">姓名</span><span id="s-name"></span></div>
        <div class="success-row"><span class="success-label">電話</span><span id="s-phone"></span></div>
        <div class="success-row"><span class="success-label">日期</span><span id="s-date"></span></div>
        <div class="success-row"><span class="success-label">時間</span><span id="s-time"></span></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button class="btn-again" onclick="resetBooking()" style="flex:1;">再次預約</button>
        <button class="btn-again" onclick="cancelThisBooking()" id="btn-cancel-this" style="flex:1;border-color:#a32d2d;color:#a32d2d;">取消此預約</button>
      </div>
      <a href="https://line.me/R/ti/p/@176jnbpb" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;background:#06C755;color:#fff;border-radius:8px;padding:13px;font-size:15px;font-weight:500;text-decoration:none;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.02 2 11c0 3.07 1.6 5.78 4.07 7.5L5 21l3.13-1.04C9.3 20.63 10.63 21 12 21c5.52 0 10-4.02 10-9S17.52 2 12 2zm5 12.5h-3.5v-5H15v3.5h2v1.5zm-5 0h-1.5v-5H12v5zm-3 0H7.5V12H9v1h1.5v1.5zm-.5-3H8V10h1.5v1.5z"/></svg>
        加入LINE好友，預約前1天收提醒
      </a>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzAxGLuZWykA8qF42z7CFjYTYYdzjjgfapXw-RA9EBOYkeeL9fF9Sb7AxG82QNX7sQX/exec';
const MAX_PER_SLOT = 2;
const TIME_SLOTS_WEEKDAY = ['09:20','10:00','10:40','11:20','14:30','15:10','15:50','16:30','17:10','17:50','18:30','19:10','19:50','20:30'];
const TIME_SLOTS_SAT = ['09:20','10:00','10:40','11:20','14:20','15:00','15:40','16:20','17:00','17:40','18:20','19:00','19:40','20:20'];
const TIME_SLOTS_SUN = ['09:20','10:00','10:40','11:20','14:40','15:20','16:00','16:40','17:20','18:00','18:40'];

function getTimeSlots(dateStr) {
  const dow = new Date(dateStr).getDay();
  if (dow === 6) return TIME_SLOTS_SAT;
  if (dow === 0) return TIME_SLOTS_SUN;
  return TIME_SLOTS_WEEKDAY;
}

let calYear, calMonth, selectedDate = '', selectedTime = '', allAppointments = [];
let lastBookingId = null;
let lineUserId = '';

async function initLiff() {
  try {
    await liff.init({ liffId: '2009808818-ljUNlVss' });
    if (liff.isLoggedIn()) {
      const profile = await liff.getProfile();
      lineUserId = profile.userId;
    }
  } catch(e) {
    // 不在 LINE 環境中，略過
  }
}
let dataReady = false;

const CACHE_KEY = 'clinic_apts';
const CACHE_TTL = 5 * 60 * 1000; // 5 分鐘

function saveCache(apts) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: apts })); } catch(e) {}
}
function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (Date.now() - obj.ts > CACHE_TTL) return null;
    return obj.data;
  } catch(e) { return null; }
}

async function loadAppointments() {
  // 先嘗試快取，立即顯示畫面
  const cached = loadCache();
  if (cached) {
    allAppointments = cached;
    dataReady = true;
    document.getElementById('init-loading').style.display = 'none';
    initCalendar();
  } else {
    // 沒有快取：先顯示日曆骨架，背景載入資料
    document.getElementById('init-loading').style.display = 'none';
    initCalendar();
  }

  // 背景向 API 拿最新資料
  try {
    const res = await fetch(API + '?action=getAll', { method: 'POST', body: JSON.stringify({}) });
    const json = await res.json();
    allAppointments = json.appointments || [];
    saveCache(allAppointments);
    dataReady = true;
    // 更新日曆與時段（資料回來後刷新）
    renderCalendar();
    if (selectedDate) renderSlots();
  } catch(e) {
    dataReady = true;
  }
}

function toDateStr(date) {
  return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
}

function getSlotCount(date, time) {
  return allAppointments.filter(a => String(a.date) === date && String(a.time) === time).length;
}

function initCalendar() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  renderCalendar();
}

function renderCalendar() {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent = calYear + '年 ' + months[calMonth];
  const today = toDateStr(new Date());
  const lastDay = new Date(calYear, calMonth+1, 0).getDate();
  let startDow = new Date(calYear, calMonth, 1).getDay();
  if (startDow === 0) startDow = 7; startDow--;
  let html = '';
  for (let i = 0; i < startDow; i++) {
    const d = new Date(calYear, calMonth, 1-startDow+i);
    html += '<div class="cal-day other-month past">' + d.getDate() + '</div>';
  }
  for (let d = 1; d <= lastDay; d++) {
    const ds = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const isPast = ds < today;
    const availableSlots = getTimeSlots(ds).filter(t => getSlotCount(ds, t) < MAX_PER_SLOT).length;
    let cls = 'cal-day';
    if (ds === today) cls += ' today';
    if (ds === selectedDate) cls += ' selected';
    if (isPast) cls += ' past other-month';
    else if (availableSlots > 0) cls += ' has-slots';
    else cls += ' full';
    const click = isPast ? '' : 'onclick="selectDate(\'' + ds + '\')"';
    html += '<div class="' + cls + '" ' + click + '>' + d + '</div>';
  }
  const rem = (7 - ((startDow + lastDay) % 7)) % 7;
  for (let i = 1; i <= rem; i++) html += '<div class="cal-day other-month past">' + i + '</div>';
  document.getElementById('cal-body').innerHTML = html;
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function selectDate(ds) {
  selectedDate = ds;
  selectedTime = '';
  renderCalendar();
  renderSlots();
  document.getElementById('form-card').style.display = 'none';
}

function renderSlots() {
  const p = selectedDate.split('-');
  document.getElementById('slot-title').textContent = p[0] + '年' + parseInt(p[1]) + '月' + parseInt(p[2]) + '日 可用時段';
  const todayStr = toDateStr(new Date());
  const now = new Date();
  const available = getTimeSlots(selectedDate).filter(t => {
    if (getSlotCount(selectedDate, t) >= MAX_PER_SLOT) return false;
    if (selectedDate === todayStr) {
      const [h, m] = t.split(':').map(Number);
      const slotTime = new Date();
      slotTime.setHours(h, m, 0, 0);
      if (slotTime <= now) return false;
    }
    return true;
  });
  if (available.length === 0) {
    document.getElementById('slot-list').innerHTML = '<div class="empty-slots">當天時段已全部額滿<br>請選擇其他日期</div>';
    return;
  }
  let html = '<div class="slots-grid">';
  available.forEach(t => {
    const count = getSlotCount(selectedDate, t);
    const remaining = MAX_PER_SLOT - count;
    const sel = t === selectedTime ? ' selected' : '';
    html += '<div class="slot' + sel + '" onclick="selectTime(\'' + t + '\')">' + t;
    if (remaining === 1) html += '<div class="slot-remaining">剩1位</div>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('slot-list').innerHTML = html;
}

function selectTime(time) {
  selectedTime = time;
  renderSlots();
  const p = selectedDate.split('-');
  document.getElementById('booking-summary').innerHTML =
    '預約日期：' + p[0] + '年' + parseInt(p[1]) + '月' + parseInt(p[2]) + '日　時間：' + time;
  document.getElementById('form-card').style.display = 'block';
  document.getElementById('form-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function saveCustomerInfo(name, phone) {
  try { localStorage.setItem('clinic_customer', JSON.stringify({ name, phone })); } catch(e) {}
}
function loadCustomerInfo() {
  try { return JSON.parse(localStorage.getItem('clinic_customer') || 'null'); } catch(e) { return null; }
}

async function submitBooking() {
  const name = document.getElementById('book-name').value.trim();
  const phone = document.getElementById('book-phone').value.trim();
  const msg = document.getElementById('submit-msg');
  const btn = document.getElementById('btn-submit');
  if (!name) { msg.className = 'msg-err'; msg.textContent = '請填寫姓名'; return; }
  if (!phone) { msg.className = 'msg-err'; msg.textContent = '請填寫電話'; return; }
  if (!selectedDate || !selectedTime) { msg.className = 'msg-err'; msg.textContent = '請選擇日期和時段'; return; }
  // 再次確認時段沒有額滿
  if (getSlotCount(selectedDate, selectedTime) >= MAX_PER_SLOT) {
    msg.className = 'msg-err'; msg.textContent = '此時段剛剛已額滿，請重新選擇';
    renderSlots(); return;
  }
  btn.disabled = true; btn.textContent = '送出中，請稍候...';
  try {
    const res = await fetch(API + '?action=addAppointment', {
      method: 'POST',
      body: JSON.stringify({ customerName: name, phone, date: selectedDate, time: selectedTime, note: '顧客自行預約', gender: '', count: 1, lineUserId })
    });
    const data = await res.json();
    if (data.success) {
      saveCustomerInfo(name, phone);
      lastBookingId = data.id;
      allAppointments.push({ id: data.id, customerName: name, phone, date: selectedDate, time: selectedTime });
      saveCache(allAppointments);
      document.getElementById('s-name').textContent = name;
      document.getElementById('s-phone').textContent = phone;
      const p = selectedDate.split('-');
      document.getElementById('s-date').textContent = p[0] + '年' + parseInt(p[1]) + '月' + parseInt(p[2]) + '日';
      document.getElementById('s-time').textContent = selectedTime;
      document.getElementById('main-screen').style.display = 'none';
      document.getElementById('success-screen').style.display = 'block';
      window.scrollTo(0, 0);
    } else {
      msg.className = 'msg-err'; msg.textContent = '預約失敗，請再試一次';
    }
  } catch(e) { msg.className = 'msg-err'; msg.textContent = '連線錯誤，請確認網路後再試'; }
  btn.disabled = false; btn.textContent = '確認預約';
}

function resetBooking() {
  selectedDate = ''; selectedTime = '';
  document.getElementById('book-name').value = '';
  document.getElementById('book-phone').value = '';
  document.getElementById('submit-msg').textContent = '';
  document.getElementById('form-card').style.display = 'none';
  document.getElementById('slot-list').innerHTML = '<div class="select-date-hint">請先選擇日期</div>';
  document.getElementById('slot-title').textContent = '選擇時段';
  document.getElementById('main-screen').style.display = 'block';
  document.getElementById('success-screen').style.display = 'none';
  renderCalendar();
  window.scrollTo(0, 0);
}

// 自動填入上次使用的姓名與電話
const _saved = loadCustomerInfo();
if (_saved) {
  if (_saved.name) document.getElementById('book-name').value = _saved.name;
  if (_saved.phone) {
    document.getElementById('book-phone').value = _saved.phone;
    document.getElementById('cancel-phone').value = _saved.phone;
  }
}

initLiff();
loadAppointments();

// ── 頁籤切換 ──────────────────────────────
function switchPage(page) {
  const isBook = page === 'book';
  document.getElementById('tab-book').classList.toggle('active', isBook);
  document.getElementById('tab-cancel').classList.toggle('active', !isBook);

  document.getElementById('main-screen').style.display = isBook ? 'block' : 'none';
  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('cancel-screen').style.display = isBook ? 'none' : 'block';
  document.getElementById('cancel-success-screen').style.display = 'none';

  if (!isBook) {
    document.getElementById('cancel-msg').textContent = '';
    document.getElementById('cancel-result-card').style.display = 'none';
  }
}

// ── 取消預約 ──────────────────────────────
function normPhone(p) { return String(p).replace(/[-\s]/g,'').replace(/^0+/,''); }

function searchBookings() {
  const phone = document.getElementById('cancel-phone').value.trim();
  const msg = document.getElementById('cancel-msg');
  if (!phone) { msg.textContent = '請輸入電話號碼'; return; }
  msg.textContent = '';

  const today = toDateStr(new Date());
  const found = allAppointments.filter(a =>
    normPhone(a.phone) === normPhone(phone) && String(a.date) >= today
  ).sort((a, b) => (a.date + a.time) > (b.date + b.time) ? 1 : -1);

  const card = document.getElementById('cancel-result-card');
  const list = document.getElementById('cancel-result-list');
  const title = document.getElementById('cancel-result-title');
  card.style.display = 'block';

  if (found.length === 0) {
    title.textContent = '查詢結果';
    list.innerHTML = '<div class="empty-slots">查無此電話的預約記錄<br><span style="font-size:12px;">只顯示今日起的未來預約</span></div>';
    return;
  }

  title.textContent = '共找到 ' + found.length + ' 筆預約';
  list.innerHTML = found.map(a => {
    const p = String(a.date).split('-');
    const dateStr = p[0] + '年' + parseInt(p[1]) + '月' + parseInt(p[2]) + '日';
    const nameStr = a.customerName ? '　' + a.customerName : '';
    return `<div class="cancel-apt-item">
      <div class="cancel-apt-info">
        <div class="apt-datetime">${dateStr}　${a.time}</div>
        <div class="apt-phone">${a.phone}${nameStr}</div>
      </div>
      <button class="btn-cancel-apt" id="cancel-btn-${a.id}" onclick="confirmCancel('${a.id}','${dateStr}','${a.time}','${a.phone}')">取消預約</button>
    </div>`;
  }).join('');
}

async function confirmCancel(id, dateStr, time, phone) {
  if (!confirm(`確定要取消這筆預約嗎？\n${dateStr}　${time}`)) return;

  // 立刻更新畫面（Optimistic UI）
  allAppointments = allAppointments.filter(a => String(a.id) !== String(id));
  saveCache(allAppointments);
  document.getElementById('cancel-success-detail').innerHTML =
    `<div class="success-row"><span class="success-label">電話</span><span>${phone}</span></div>
     <div class="success-row"><span class="success-label">日期</span><span>${dateStr}</span></div>
     <div class="success-row"><span class="success-label">時間</span><span>${time}</span></div>`;
  document.getElementById('cancel-screen').style.display = 'none';
  document.getElementById('cancel-success-screen').style.display = 'block';
  window.scrollTo(0, 0);

  // 背景送出 API
  try {
    const res = await fetch(API + '?action=deleteAppointment', { method: 'POST', body: JSON.stringify({ id }) });
    const data = await res.json();
    if (!data.success) {
      // 失敗則還原
      await loadAppointments();
      alert('取消失敗，請再試一次');
      document.getElementById('cancel-success-screen').style.display = 'none';
      document.getElementById('cancel-screen').style.display = 'block';
    }
  } catch(e) {
    await loadAppointments();
    alert('連線錯誤，請確認網路後再試');
    document.getElementById('cancel-success-screen').style.display = 'none';
    document.getElementById('cancel-screen').style.display = 'block';
  }
}

async function cancelThisBooking() {
  if (!lastBookingId) return;
  if (!confirm('確定要取消這筆預約嗎？')) return;

  const cancelId = lastBookingId;
  const dateText = document.getElementById('s-date').textContent;
  const timeText = document.getElementById('s-time').textContent;

  // 立刻更新畫面（Optimistic UI）
  allAppointments = allAppointments.filter(a => String(a.id) !== String(cancelId));
  saveCache(allAppointments);
  lastBookingId = null;
  document.getElementById('cancel-success-detail').innerHTML =
    '<div class="success-row"><span class="success-label">日期</span><span>' + dateText + '</span></div>' +
    '<div class="success-row"><span class="success-label">時間</span><span>' + timeText + '</span></div>';
  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('cancel-success-screen').style.display = 'block';
  window.scrollTo(0, 0);

  // 背景送出 API
  try {
    const res = await fetch(API + '?action=deleteAppointment', { method: 'POST', body: JSON.stringify({ id: cancelId }) });
    const data = await res.json();
    if (!data.success) {
      await loadAppointments();
      alert('取消失敗，請再試一次');
      document.getElementById('cancel-success-screen').style.display = 'none';
      document.getElementById('success-screen').style.display = 'block';
    }
  } catch(e) {
    await loadAppointments();
    alert('連線錯誤，請確認網路後再試');
    document.getElementById('cancel-success-screen').style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';
  }
}

function backToCancel() {
  document.getElementById('cancel-success-screen').style.display = 'none';
  document.getElementById('cancel-screen').style.display = 'block';
  document.getElementById('cancel-phone').value = '';
  document.getElementById('cancel-result-card').style.display = 'none';
}
