<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>顧客健康記錄管理</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede8;
    --text: #1a1a18; --text2: #6b6b67; --text3: #a0a09c;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --info-bg: #e6f1fb; --info-text: #185fa5;
    --radius: 10px; --radius-sm: 7px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333330;
      --text: #f0efe8; --text2: #a0a09a; --text3: #6a6a65;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --info-bg: #0c2840; --info-text: #85b7eb;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .topbar { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .topbar h1 { font-size: 16px; font-weight: 500; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 20px 16px 60px; }
  .tab-row { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 7px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 0.5px solid var(--border2); color: var(--text2); background: transparent; transition: all 0.15s; }
  .tab:hover { background: var(--bg2); }
  .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 12px; }
  .section-label { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; color: var(--text2); }
  input, select, textarea { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 13px; color: var(--text); font-family: inherit; outline: none; transition: border-color 0.15s; width: 100%; }
  input:focus, select:focus, textarea:focus { border-color: var(--text); }
  textarea { min-height: 68px; resize: vertical; }
  .btn { background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 16px; font-size: 13px; cursor: pointer; color: var(--text); transition: background 0.15s; font-family: inherit; }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-danger { border-color: #f09595; color: #a32d2d; }
  .btn-danger:hover { background: #fcebeb; }
  .btn-sm { padding: 3px 9px; font-size: 11px; }
  .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-bar input { flex: 1; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--info-bg); display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 15px; color: var(--info-text); flex-shrink: 0; }
  .customer-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 14px 0; }
  .visit-card { border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 8px; background: var(--bg2); }
  .visit-row { display: flex; gap: 6px; margin-bottom: 4px; align-items: flex-start; }
  .visit-label { font-size: 12px; color: var(--text2); min-width: 52px; padding-top: 2px; flex-shrink: 0; }
  .visit-value { font-size: 13px; flex: 1; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 20px; }
  .badge-improve { background: #eaf3de; color: #3b6d11; }
  .badge-partial { background: #faeeda; color: #854f0b; }
  .badge-none { background: #fcebeb; color: #a32d2d; }
  .badge-unknown { background: var(--bg3); color: var(--text2); }
  .symptom-tag { display: inline-block; background: var(--info-bg); color: var(--info-text); font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-right: 4px; margin-bottom: 2px; }
  .visit-count { font-size: 12px; color: var(--text2); background: var(--bg2); padding: 2px 9px; border-radius: 20px; }
  .improve-select { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .improve-opt { padding: 5px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 0.5px solid var(--border2); color: var(--text2); background: transparent; transition: all 0.12s; font-family: inherit; }
  .improve-opt.sel-improve { background: #eaf3de; color: #3b6d11; border-color: #97c459; }
  .improve-opt.sel-partial { background: #faeeda; color: #854f0b; border-color: #ef9f27; }
  .improve-opt.sel-none { background: #fcebeb; color: #a32d2d; border-color: #f09595; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }
  .no-result { background: var(--bg2); border-radius: var(--radius); padding: 2rem 1rem; text-align: center; color: var(--text2); font-size: 14px; }
  .msg-ok { color: #3b6d11; font-size: 13px; margin-left: 10px; }
  .msg-err { color: #a32d2d; font-size: 13px; margin-left: 10px; }
  .info-pill { font-size: 13px; padding: 6px 12px; background: var(--info-bg); color: var(--info-text); border-radius: var(--radius-sm); display: inline-block; }
  .warn-pill { font-size: 13px; padding: 6px 12px; background: var(--bg2); color: var(--text2); border-radius: var(--radius-sm); display: inline-block; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .loading { text-align:center; padding: 2rem; color: var(--text2); font-size: 13px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sync-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
  .sync-ok { background: #eaf3de; color: #3b6d11; }
  .sync-err { background: #fcebeb; color: #a32d2d; }
  .sync-ing { background: var(--bg3); color: var(--text2); }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-header h2 { font-size: 16px; font-weight: 500; }
  .cal-nav { background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 6px 12px; cursor: pointer; font-size: 16px; color: var(--text); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
  .cal-day-label { text-align: center; font-size: 11px; color: var(--text2); padding: 4px 0; font-weight: 500; }
  .cal-day { text-align: center; padding: 8px 4px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; border: 0.5px solid transparent; transition: all 0.12s; position: relative; }
  .cal-day:hover { background: var(--bg2); }
  .cal-day.today { border-color: var(--border2); font-weight: 500; }
  .cal-day.selected { background: var(--text); color: var(--bg); }
  .cal-day.other-month { color: var(--text3); }
  .cal-day.has-apt::after { content: ''; display: block; width: 5px; height: 5px; border-radius: 50%; background: #185fa5; margin: 2px auto 0; }
  .cal-day.selected.has-apt::after { background: var(--bg); }
  .apt-card { border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 8px; background: var(--bg2); display: flex; align-items: center; justify-content: space-between; }
  .apt-time { font-size: 15px; font-weight: 500; color: var(--info-text); min-width: 52px; }
  .apt-info { flex: 1; margin-left: 12px; }
  .apt-name { font-size: 13px; font-weight: 500; }
  .apt-phone { font-size: 12px; color: var(--text2); }
  .apt-note { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .add-apt-form { background: var(--bg2); border-radius: var(--radius-sm); padding: 14px; margin-top: 12px; border: 0.5px solid var(--border); }
  .add-apt-title { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .view-toggle { display:flex; gap:6px; margin-bottom:14px; }
  .view-btn { padding:5px 14px; border-radius:20px; font-size:12px; cursor:pointer; border:0.5px solid var(--border2); color:var(--text2); background:transparent; transition:all 0.12s; font-family:inherit; }
  .view-btn.active { background:var(--text); color:var(--bg); border-color:var(--text); }
  .week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:14px; }
  .week-col { min-width:0; }
  .week-col-header { text-align:center; font-size:12px; color:var(--text2); padding:4px 2px; font-weight:500; }
  .week-col-date { text-align:center; font-size:13px; padding:6px 2px; border-radius:var(--radius-sm); cursor:pointer; margin-bottom:4px; border:0.5px solid transparent; }
  .week-col-date:hover { background:var(--bg2); }
  .week-col-date.today { border-color:var(--border2); font-weight:500; }
  .week-col-date.selected { background:var(--text); color:var(--bg); }
  .week-apt-item { background:var(--info-bg); color:var(--info-text); border-radius:var(--radius-sm); padding:3px 6px; font-size:11px; margin-bottom:3px; cursor:pointer; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .week-apt-item:hover { opacity:0.8; }
  .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); z-index: 100; display:flex; align-items:center; justify-content:center; padding:16px; }
  .modal-box { background: var(--bg); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; border: 0.5px solid var(--border); }
  .modal-title { font-size: 15px; font-weight: 500; margin-bottom: 16px; }
  .modal-footer { display:flex; gap:8px; margin-top:16px; }
</style>
</head>
<body>
<div class="topbar">
  <h1>顧客健康記錄管理</h1>
  <span id="sync-status" class="sync-badge sync-ing">載入中...</span>
</div>
<div class="wrap">
  <div class="tab-row">
    <button class="tab active" onclick="switchTab('search',this)">查詢顧客</button>
    <button class="tab" onclick="switchTab('add-customer',this)">新增顧客</button>
    <button class="tab" onclick="switchTab('add-visit',this)">新增就診記錄</button>
    <button class="tab" onclick="switchTab('list',this)">所有顧客</button>
    <button class="tab" onclick="switchTab('appointment',this)">預約管理</button>
  </div>

  <div id="tab-search" class="tab-content active">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="輸入顧客電話號碼..." onkeydown="if(event.key==='Enter')searchCustomer()" />
      <button class="btn btn-primary" onclick="searchCustomer()">查詢</button>
    </div>
    <div id="search-result"><div class="empty">輸入電話號碼查詢顧客資料</div></div>
  </div>

  <div id="tab-add-customer" class="tab-content">
    <div class="card">
      <div class="section-label" style="margin-bottom:14px;">新增顧客資料</div>
      <div class="form-grid">
        <div class="form-group"><label>姓名（選填）</label><input type="text" id="new-name" placeholder="顧客姓名" /></div>
        <div class="form-group"><label>電話 *</label><input type="text" id="new-phone" placeholder="0912345678" /></div>
        <div class="form-group"><label>性別</label><select id="new-gender"><option value="">不填</option><option value="男">男</option><option value="女">女</option></select></div>
        <div class="form-group"><label>年齡</label><input type="number" id="new-age" placeholder="例：45" min="1" max="120" /></div>
      </div>
      <div class="form-group" style="margin-bottom:14px;"><label>備註</label><textarea id="new-note" placeholder="其他備註（過敏、特殊狀況等）"></textarea></div>
      <button class="btn btn-primary" id="btn-add-customer" onclick="addCustomer()">新增顧客</button>
      <span id="add-customer-msg"></span>
    </div>
  </div>

  <div id="tab-add-visit" class="tab-content">
    <div class="card">
      <div class="section-label" style="margin-bottom:14px;">新增就診記錄</div>
      <div class="form-grid">
        <div class="form-group"><label>顧客電話 *</label><input type="text" id="visit-phone" placeholder="輸入電話查找顧客" oninput="lookupVisitCustomer()" /></div>
        <div class="form-group"><label>就診日期 *</label><input type="date" id="visit-date" /></div>
        <div class="form-group"><label>就診時間（選填）</label><input type="text" id="visit-time" placeholder="例如 10:40" /></div>
      </div>
      <div id="visit-customer-info" style="margin-bottom:10px;"></div>
      <div class="form-group" style="margin-bottom:10px;"><label>身體症狀（多個症狀用逗號分隔）*</label><textarea id="visit-symptoms" placeholder="例：肩頸痠痛、下背痛、頭痛"></textarea></div>
      <div class="form-group" style="margin-bottom:10px;"><label>處理方式</label><textarea id="visit-treatment" placeholder="例：推拿、針灸、熱敷..."></textarea></div>
      <div class="form-group" style="margin-bottom:14px;">
        <label>改善程度</label>
        <div class="improve-select">
          <button class="improve-opt" id="opt-improve" onclick="selectImprove('明顯改善')">明顯改善</button>
          <button class="improve-opt" id="opt-partial" onclick="selectImprove('部分改善')">部分改善</button>
          <button class="improve-opt" id="opt-none" onclick="selectImprove('未明顯改善')">未明顯改善</button>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:14px;"><label>備註</label><input type="text" id="visit-note" placeholder="其他備註..." /></div>
      <button class="btn btn-primary" id="btn-add-visit" onclick="addVisit()">儲存記錄</button>
      <span id="add-visit-msg"></span>
    </div>
  </div>

  <div id="tab-list" class="tab-content">
    <div id="all-customers-list"><div class="empty">請切換到此頁載入</div></div>
  </div>

  <div id="tab-appointment" class="tab-content">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div class="view-toggle">
          <button class="view-btn active" id="btn-month-view" onclick="switchCalView('month')">月</button>
          <button class="view-btn" id="btn-week-view" onclick="switchCalView('week')">週</button>
        </div>
        <div class="cal-header" style="margin-bottom:0;flex:1;justify-content:center;gap:16px;">
          <button class="cal-nav" id="cal-prev" onclick="calPrev()">‹</button>
          <h2 id="cal-title" style="min-width:120px;text-align:center;"></h2>
          <button class="cal-nav" id="cal-next" onclick="calNext()">›</button>
        </div>
      </div>
      <!-- 月視圖 -->
      <div id="month-view-wrap">
        <div class="cal-grid">
          <div class="cal-day-label">一</div><div class="cal-day-label">二</div>
          <div class="cal-day-label">三</div><div class="cal-day-label">四</div>
          <div class="cal-day-label">五</div><div class="cal-day-label">六</div>
          <div class="cal-day-label">日</div>
        </div>
        <div class="cal-grid" id="cal-body"></div>
      </div>
      <!-- 週視圖 -->
      <div id="week-view-wrap" style="display:none;">
        <div class="week-grid" id="week-body"></div>
      </div>
      <div class="divider"></div>
      <div>
        <div style="font-size:13px;font-weight:500;margin-bottom:10px;" id="apt-date-title">請選擇日期</div>
        <div id="apt-list"></div>
        <div class="add-apt-form" id="add-apt-form" style="display:none;">
          <div class="add-apt-title">新增預約</div>
          <div class="form-grid">
            <div class="form-group"><label>顧客姓名</label><input type="text" id="apt-name" placeholder="姓名（選填）" /></div>
            <div class="form-group"><label>電話 *</label><input type="text" id="apt-phone" placeholder="0912345678" /></div>
            <div class="form-group"><label>性別</label><select id="apt-gender"><option value="">不填</option><option value="男">男</option><option value="女">女</option></select></div>
            <div class="form-group"><label>預約人數</label><input type="number" id="apt-count" placeholder="例：1" min="1" /></div>
          </div>
          <div class="form-group" style="margin-bottom:10px;">
            <label>預約時間 *</label>
            <select id="apt-time-select" onchange="handleTimeSelect()">
              <option value="">— 選擇時間 —</option>
              <option value="08:40">08:40</option><option value="09:20">09:20</option>
              <option value="10:00">10:00</option><option value="10:40">10:40</option>
              <option value="11:20">11:20</option><option value="14:30">14:30</option>
              <option value="15:10">15:10</option><option value="15:50">15:50</option>
              <option value="16:30">16:30</option><option value="17:10">17:10</option>
              <option value="17:50">17:50</option><option value="18:30">18:30</option>
              <option value="19:10">19:10</option><option value="19:50">19:50</option>
              <option value="20:30">20:30</option>
              <option value="other">其他時間（自行輸入）</option>
            </select>
            <input type="text" id="apt-time-custom" placeholder="請輸入時間，例如 13:15" style="margin-top:6px;display:none;" />
            <input type="hidden" id="apt-time" />
          </div>
          <div class="form-group" style="margin-bottom:12px;"><label>備註</label><input type="text" id="apt-note" placeholder="備註（選填）" /></div>
          <div style="border-top:0.5px solid var(--border);margin:14px 0 12px;"></div>
          <div style="font-size:11px;color:var(--text3);font-weight:500;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;">就診記錄（選填）</div>
          <div class="form-group" style="margin-bottom:10px;"><label>身體症狀（多個症狀用逗號分隔）</label><textarea id="apt-symptoms" placeholder="例：肩頸痠痛、下背痛、頭痛" style="min-height:60px;"></textarea></div>
          <div class="form-group" style="margin-bottom:10px;"><label>處理方式</label><textarea id="apt-treatment" placeholder="例：推拿、針灸、熱敷..." style="min-height:60px;"></textarea></div>
          <div class="form-group" style="margin-bottom:14px;">
            <label>改善程度</label>
            <div class="improve-select">
              <button class="improve-opt" id="apt-opt-improve" onclick="selectAptImprove('明顯改善')">明顯改善</button>
              <button class="improve-opt" id="apt-opt-partial" onclick="selectAptImprove('部分改善')">部分改善</button>
              <button class="improve-opt" id="apt-opt-none" onclick="selectAptImprove('未明顯改善')">未明顯改善</button>
            </div>
          </div>
          <button class="btn btn-primary" id="btn-add-apt" onclick="addAppointment()">確認新增</button>
          <button class="btn" style="margin-left:8px;" onclick="toggleAptForm(false)">取消</button>
          <span id="add-apt-msg"></span>
        </div>
        <button class="btn btn-primary" id="btn-show-apt-form" style="margin-top:10px;display:none;" onclick="toggleAptForm(true)">＋ 新增預約</button>
      </div>
    </div>
  </div>
</div>

<!-- 編輯顧客 Modal -->
<div class="modal-overlay" id="modal-customer" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">編輯顧客資料</div>
    <input type="hidden" id="edit-customer-id" />
    <div class="form-grid">
      <div class="form-group"><label>姓名</label><input type="text" id="edit-customer-name" placeholder="顧客姓名（選填）" /></div>
      <div class="form-group"><label>電話 *</label><input type="text" id="edit-customer-phone" /></div>
      <div class="form-group"><label>性別</label><select id="edit-customer-gender"><option value="">不填</option><option value="男">男</option><option value="女">女</option></select></div>
      <div class="form-group"><label>年齡</label><input type="number" id="edit-customer-age" min="1" max="120" /></div>
    </div>
    <div class="form-group" style="margin-bottom:14px;"><label>備註</label><textarea id="edit-customer-note"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveCustomer()">儲存</button>
      <button class="btn" onclick="closeModal('modal-customer')">取消</button>
      <span id="edit-customer-msg" style="font-size:13px;align-self:center;margin-left:4px;"></span>
    </div>
  </div>
</div>

<!-- 編輯就診記錄 Modal -->
<div class="modal-overlay" id="modal-visit" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">編輯就診記錄</div>
    <input type="hidden" id="edit-visit-id" />
    <div class="form-grid">
      <div class="form-group"><label>就診日期</label><input type="date" id="edit-visit-date" /></div>
      <div class="form-group"><label>就診時間</label><input type="text" id="edit-visit-time" placeholder="例如 10:40" /></div>
    </div>
    <div class="form-group" style="margin-bottom:10px;"><label>身體症狀（逗號分隔）</label><textarea id="edit-visit-symptoms"></textarea></div>
    <div class="form-group" style="margin-bottom:10px;"><label>處理方式</label><textarea id="edit-visit-treatment"></textarea></div>
    <div class="form-group" style="margin-bottom:10px;">
      <label>改善程度</label>
      <div class="improve-select">
        <button class="improve-opt" id="edit-opt-improve" onclick="selectEditImprove('明顯改善')">明顯改善</button>
        <button class="improve-opt" id="edit-opt-partial" onclick="selectEditImprove('部分改善')">部分改善</button>
        <button class="improve-opt" id="edit-opt-none" onclick="selectEditImprove('未明顯改善')">未明顯改善</button>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:14px;"><label>備註</label><input type="text" id="edit-visit-note" /></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveVisit()">儲存</button>
      <button class="btn" onclick="closeModal('modal-visit')">取消</button>
      <span id="edit-visit-msg" style="font-size:13px;align-self:center;margin-left:4px;"></span>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwVmQ5cxfwKwnClwrdzyfWG-jtCpmMfVnzC9q7IHSHCxp5p4MzjIzck1auQ-B4TXBYI/exec';
let customersCache = [];
let visitsCache = [];
let allAppointments = [];
let selectedImprovement = '';
let selectedAptImprovement = '';
let calYear, calMonth, selectedDate = '', calView = 'month', weekStart = null;
let dataLoaded = false;

async function api(action, body={}) {
  const res = await fetch(API+'?action='+action, { method:'POST', body: JSON.stringify(body) });
  return res.json();
}

function setSyncStatus(state, text) {
  const el = document.getElementById('sync-status');
  el.textContent = text; el.className = 'sync-badge '+state;
}

// 一次載入所有資料
async function loadAll(force=false) {
  if (dataLoaded && !force) return;
  setSyncStatus('sync-ing','載入中...');
  try {
    const data = await api('getAll');
    customersCache = data.customers || [];
    visitsCache = data.visits || [];
    allAppointments = data.appointments || [];
    dataLoaded = true;
    setSyncStatus('sync-ok','已連線 ✓');
  } catch(e) { setSyncStatus('sync-err','連線失敗'); }
}

function normPhone(p) { return String(p).replace(/[-\s]/g,'').replace(/^0+/,''); }
function findCustomer(phone) { const n=normPhone(phone); return customersCache.find(c=>normPhone(c.phone)===n); }
function displayName(c) { return c.name || c.phone; }
function getInitials(c) { return c.name ? c.name.slice(0,2) : String(c.phone).slice(-2); }

function improveBadge(v) {
  if (v==='明顯改善') return '<span class="badge badge-improve">明顯改善</span>';
  if (v==='部分改善') return '<span class="badge badge-partial">部分改善</span>';
  if (v==='未明顯改善') return '<span class="badge badge-none">未明顯改善</span>';
  return '<span class="badge badge-unknown">'+(v||'未填寫')+'</span>';
}

function loading(msg) { return '<div class="loading"><span class="spinner"></span>'+(msg||'載入中...')+'</div>'; }

function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='add-visit') document.getElementById('visit-date').value=new Date().toISOString().split('T')[0];
  if (name==='list') renderAllCustomers();
  if (name==='appointment') initCalendar();
}

function renderCustomerCard(customer) {
  const visits = visitsCache.filter(v=>String(v.customerId)===String(customer.id))
    .sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  let h='<div class="card">';
  h+='<div class="customer-header">';
  h+='<div class="avatar">'+getInitials(customer)+'</div>';
  h+='<div style="flex:1;"><div style="font-weight:500;font-size:16px;">'+displayName(customer)+'</div>';
  h+='<div style="font-size:13px;color:var(--text2);">'+(customer.name?customer.phone:'');
  if (customer.gender||customer.age) h+=(customer.name?' · ':'')+(customer.gender||'')+(customer.age?' '+customer.age+'歲':'');
  h+='</div></div>';
  h+='<div style="display:flex;align-items:center;gap:8px;"><span class="visit-count">共 '+visits.length+' 次</span>';
  h+='<button class="btn btn-sm" onclick="openEditCustomer(\''+customer.id+'\')">編輯</button>';
  h+='<button class="btn btn-danger btn-sm" onclick="deleteCustomer(\''+customer.id+'\')">刪除顧客</button></div></div>';
  if (customer.note) h+='<div style="font-size:12px;color:var(--text2);margin-bottom:10px;">備註：'+customer.note+'</div>';
  h+='<div class="divider"></div>';
  if (visits.length===0) {
    h+='<div style="color:var(--text2);font-size:13px;padding:6px 0;">尚無就診記錄</div>';
  } else {
    h+='<div class="section-label">就診記錄</div>';
    visits.forEach(v=>{
      const syms=Array.isArray(v.symptoms)?v.symptoms:(v.symptoms?String(v.symptoms).split(','):[]);
      h+='<div class="visit-card">';
      h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">';
      h+='<span style="font-size:13px;font-weight:500;">'+v.date+(v.time?' '+v.time:'')+'</span>';
      h+='<div style="display:flex;align-items:center;gap:6px;">'+improveBadge(v.improvement);
      h+='<button class="btn btn-sm" onclick="openEditVisit(\''+v.id+'\')">編輯</button>';
      h+='<button class="btn btn-danger btn-sm" onclick="deleteVisit(\''+v.id+'\')">刪除</button></div></div>';
      h+='<div class="visit-row"><span class="visit-label">症狀</span><span class="visit-value">'+syms.map(s=>'<span class="symptom-tag">'+s+'</span>').join('')+'</span></div>';
      if (v.treatment) h+='<div class="visit-row"><span class="visit-label">處理</span><span class="visit-value">'+v.treatment+'</span></div>';
      if (v.note) h+='<div class="visit-row"><span class="visit-label">備註</span><span class="visit-value" style="color:var(--text2);">'+v.note+'</span></div>';
      h+='</div>';
    });
  }
  h+='</div>';
  return h;
}

async function searchCustomer() {
  const q = document.getElementById('search-input').value.trim();
  const el = document.getElementById('search-result');
  if (!q) { el.innerHTML='<div class="empty">輸入電話號碼查詢顧客資料</div>'; return; }
  el.innerHTML = loading('查詢中...');
  await loadAll();
  const c = findCustomer(q);
  if (!c) { el.innerHTML='<div class="no-result">找不到電話「'+q+'」的顧客記錄<br><span style="font-size:12px;margin-top:6px;display:block;">請至「新增顧客」建立資料</span></div>'; return; }
  el.innerHTML = renderCustomerCard(c);
}

async function addCustomer() {
  const name=document.getElementById('new-name').value.trim();
  const phone=document.getElementById('new-phone').value.trim();
  const gender=document.getElementById('new-gender').value;
  const age=document.getElementById('new-age').value;
  const note=document.getElementById('new-note').value.trim();
  const msg=document.getElementById('add-customer-msg');
  const btn=document.getElementById('btn-add-customer');
  if (!phone) { msg.className='msg-err'; msg.textContent='電話為必填'; return; }
  btn.disabled=true; btn.textContent='新增中...';
  try {
    const res=await api('addCustomer',{name,phone,gender,age:age||'',note});
    if (res.success) {
      const newC={id:res.id,name,phone,gender,age:age||'',note};
      customersCache.push(newC);
      msg.className='msg-ok'; msg.textContent='✓ 顧客「'+(name||phone)+'」新增成功';
      document.getElementById('new-name').value='';
      document.getElementById('new-phone').value='';
      document.getElementById('new-gender').value='';
      document.getElementById('new-age').value='';
      document.getElementById('new-note').value='';
    } else { msg.className='msg-err'; msg.textContent='新增失敗，請再試一次'; }
  } catch(e) { msg.className='msg-err'; msg.textContent='連線錯誤，請確認網路'; }
  btn.disabled=false; btn.textContent='新增顧客';
}

function lookupVisitCustomer() {
  const q=document.getElementById('visit-phone').value.trim();
  const el=document.getElementById('visit-customer-info');
  if (!q) { el.innerHTML=''; return; }
  const c=findCustomer(q);
  if (c) el.innerHTML='<span class="info-pill">找到顧客：'+displayName(c)+(c.age?' （'+c.age+'歲）':'')+'</span>';
  else el.innerHTML='<span class="warn-pill">查無此電話，請先新增顧客</span>';
}

function selectImprove(val) {
  selectedImprovement=val;
  document.getElementById('opt-improve').className='improve-opt'+(val==='明顯改善'?' sel-improve':'');
  document.getElementById('opt-partial').className='improve-opt'+(val==='部分改善'?' sel-partial':'');
  document.getElementById('opt-none').className='improve-opt'+(val==='未明顯改善'?' sel-none':'');
}

async function addVisit() {
  const phone=document.getElementById('visit-phone').value.trim();
  const date=document.getElementById('visit-date').value;
  const symptomsRaw=document.getElementById('visit-symptoms').value.trim();
  const treatment=document.getElementById('visit-treatment').value.trim();
  const note=document.getElementById('visit-note').value.trim();
  const msg=document.getElementById('add-visit-msg');
  const btn=document.getElementById('btn-add-visit');
  const c=findCustomer(phone);
  if (!c) { msg.className='msg-err'; msg.textContent='找不到顧客，請先新增'; return; }
  if (!date) { msg.className='msg-err'; msg.textContent='請填寫就診日期'; return; }
  if (!symptomsRaw) { msg.className='msg-err'; msg.textContent='請填寫症狀'; return; }
  const symptoms=symptomsRaw.split(/[，,、\n]+/).map(s=>s.trim()).filter(Boolean);
  btn.disabled=true; btn.textContent='儲存中...';
  try {
    const visitTime=document.getElementById('visit-time').value.trim();
    const res=await api('addVisit',{customerId:c.id,date,symptoms,treatment,improvement:selectedImprovement||'未填寫',note,time:visitTime});
    if (res.success) {
      const visitTime=document.getElementById('visit-time').value.trim();
        visitsCache.push({id:res.id,customerId:c.id,date,symptoms,treatment,improvement:selectedImprovement||'未填寫',note,time:visitTime});
      msg.className='msg-ok'; msg.textContent='✓ 記錄已儲存';
      document.getElementById('visit-symptoms').value='';
      document.getElementById('visit-treatment').value='';
      document.getElementById('visit-note').value='';
      document.getElementById('visit-time').value='';
      document.getElementById('visit-phone').value='';
      document.getElementById('visit-customer-info').innerHTML='';
      selectedImprovement=''; selectImprove('');
    } else { msg.className='msg-err'; msg.textContent='儲存失敗，請再試一次'; }
  } catch(e) { msg.className='msg-err'; msg.textContent='連線錯誤，請確認網路'; }
  btn.disabled=false; btn.textContent='儲存記錄';
}

async function deleteCustomer(id) {
  if (!confirm('確定要刪除此顧客及其所有就診記錄？')) return;
  try {
    await api('deleteCustomer',{id});
    customersCache=customersCache.filter(c=>String(c.id)!==String(id));
    visitsCache=visitsCache.filter(v=>String(v.customerId)!==String(id));
    document.getElementById('search-result').innerHTML='<div class="empty">已刪除</div>';
    if (document.getElementById('tab-list').classList.contains('active')) renderAllCustomers();
  } catch(e) { alert('刪除失敗，請再試一次'); }
}

async function deleteVisit(id) {
  if (!confirm('確定要刪除此筆就診記錄？')) return;
  try {
    await api('deleteVisit',{id});
    visitsCache=visitsCache.filter(v=>String(v.id)!==String(id));
    const q=document.getElementById('search-input').value.trim();
    if (q) searchCustomer();
    if (document.getElementById('tab-list').classList.contains('active')) renderAllCustomers();
  } catch(e) { alert('刪除失敗，請再試一次'); }
}

function renderAllCustomers() {
  const el=document.getElementById('all-customers-list');
  if (!dataLoaded) { el.innerHTML=loading('載入中...'); loadAll().then(()=>renderAllCustomers()); return; }
  if (customersCache.length===0) { el.innerHTML='<div class="empty">尚無顧客資料</div>'; return; }
  const sorted=[...customersCache].sort((a,b)=>String(displayName(a)).localeCompare(String(displayName(b)),'zh-TW'));
  el.innerHTML=sorted.map(c=>renderCustomerCard(c)).join('');
}

// 預約系統
async function initCalendar() {
  const now=new Date();
  if (!calYear) { calYear=now.getFullYear(); calMonth=now.getMonth(); }
  if (!weekStart) weekStart = getWeekStart(now);
  if (!dataLoaded) await loadAll();
  if (calView==='month') renderCalendar();
  else renderWeekView();
  selectCalDay(now.toISOString().split('T')[0]);
}

function switchCalView(view) {
  calView = view;
  document.getElementById('btn-month-view').className='view-btn'+(view==='month'?' active':'');
  document.getElementById('btn-week-view').className='view-btn'+(view==='week'?' active':'');
  document.getElementById('month-view-wrap').style.display=view==='month'?'block':'none';
  document.getElementById('week-view-wrap').style.display=view==='week'?'block':'none';
  if (view==='month') renderCalendar();
  else renderWeekView();
}

function calPrev() {
  if (calView==='month') changeMonth(-1);
  else { weekStart=new Date(weekStart); weekStart.setDate(weekStart.getDate()-7); renderWeekView(); }
}

function calNext() {
  if (calView==='month') changeMonth(1);
  else { weekStart=new Date(weekStart); weekStart.setDate(weekStart.getDate()+7); renderWeekView(); }
}

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  d.setHours(0,0,0,0);
  return d;
}

function toDateStr(date) {
  return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
}

function renderWeekView() {
  if (!weekStart) weekStart=getWeekStart(new Date());
  const days=['一','二','三','四','五','六','日'];
  const today=toDateStr(new Date());
  const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const endDate=new Date(weekStart); endDate.setDate(endDate.getDate()+6);
  const startM=weekStart.getMonth(); const endM=endDate.getMonth();
  const titleStr=startM===endM
    ? weekStart.getFullYear()+'年 '+months[startM]
    : weekStart.getFullYear()+'年 '+months[startM]+' — '+months[endM];
  document.getElementById('cal-title').textContent=titleStr;
  let html='';
  for(let i=0;i<7;i++){
    const d=new Date(weekStart); d.setDate(d.getDate()+i);
    const ds=toDateStr(d);
    const dayApts=allAppointments.filter(a=>String(a.date)===ds).sort((a,b)=>String(a.time).localeCompare(String(b.time)));
    let dateCls='week-col-date';
    if(ds===today) dateCls+=' today';
    if(ds===selectedDate) dateCls+=' selected';
    html+='<div class="week-col">';
    html+='<div class="week-col-header">'+days[i]+'</div>';
    html+='<div class="'+dateCls+'" onclick="selectCalDay(this.dataset.ds)" data-ds="'+ds+'">'+d.getDate()+'</div>';
    dayApts.forEach(function(a){
      html+='<div class="week-apt-item" onclick="selectCalDay(this.dataset.ds)" data-ds="'+ds+'" title="'+a.time+' '+(a.customerName||'')+'">'+a.time+' '+(a.customerName||'未填姓名')+'</div>';
    });
    html+='</div>';
  }
  document.getElementById('week-body').innerHTML=html;
}

function renderCalendar() {
  const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent=calYear+'年 '+months[calMonth];
  const lastDay=new Date(calYear,calMonth+1,0).getDate();
  let startDow=new Date(calYear,calMonth,1).getDay();
  if (startDow===0) startDow=7; startDow--;
  const today=new Date().toISOString().split('T')[0];
  const aptDates=new Set(allAppointments.map(a=>String(a.date)));
  let html='';
  for (let i=0;i<startDow;i++) {
    const d=new Date(calYear,calMonth,1-startDow+i);
    html+='<div class="cal-day other-month">'+d.getDate()+'</div>';
  }
  for (let d=1;d<=lastDay;d++) {
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    let cls='cal-day';
    if (ds===today) cls+=' today';
    if (ds===selectedDate) cls+=' selected';
    if (aptDates.has(ds)) cls+=' has-apt';
    html+='<div class="'+cls+'" onclick="selectCalDay(\''+ds+'\')">'+d+'</div>';
  }
  const rem=(7-((startDow+lastDay)%7))%7;
  for (let i=1;i<=rem;i++) html+='<div class="cal-day other-month">'+i+'</div>';
  document.getElementById('cal-body').innerHTML=html;
}

function changeMonth(dir) {
  calMonth+=dir;
  if (calMonth>11){calMonth=0;calYear++;}
  if (calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function selectCalDay(ds) {
  selectedDate=ds;
  if(calView==='month') renderCalendar();
  else renderWeekView();
  const p=ds.split('-');
  document.getElementById('apt-date-title').textContent=p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日 的預約';
  document.getElementById('btn-show-apt-form').style.display='inline-block';
  renderAptList();
}

function renderAptList() {
  const el=document.getElementById('apt-list');
  const dayApts=allAppointments.filter(a=>String(a.date)===selectedDate).sort((a,b)=>String(a.time).localeCompare(String(b.time)));
  if (dayApts.length===0) { el.innerHTML='<div style="color:var(--text2);font-size:13px;padding:8px 0;">當天尚無預約</div>'; return; }
  el.innerHTML=dayApts.map(a=>{
    // 找對應的就診記錄（同顧客同日期）
    const visit = visitsCache.filter(v=>String(v.customerId)===String(a.customerId) && String(v.date)===String(a.date))
      .sort((x,y)=>String(y.createdAt||'').localeCompare(String(x.createdAt||'')))[0];
    const symptoms = visit ? (Array.isArray(visit.symptoms)?visit.symptoms:(visit.symptoms?String(visit.symptoms).split(','):[])).filter(Boolean) : [];
    const treatment = visit ? visit.treatment : '';
    return `
    <div class="apt-card" style="flex-direction:column;align-items:flex-start;">
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:${symptoms.length||treatment?'8px':'0'};">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="apt-time">${a.time}</div>
          <div class="apt-info">
            <div class="apt-name">${a.customerName||'（未填姓名）'}${a.gender?' · '+a.gender:''}${a.count&&a.count>1?' · '+a.count+'人':''}</div>
            <div class="apt-phone">${a.phone||''}</div>
            ${a.note?'<div class="apt-note">'+a.note+'</div>':''}
          </div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteAppointment('${a.id}')">取消預約</button>
      </div>
      ${symptoms.length?'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;"><span style="font-size:12px;color:var(--text2);min-width:36px;padding-top:2px;">症狀</span>'+symptoms.map(s=>'<span class="symptom-tag">'+s+'</span>').join('')+'</div>':''}
      ${treatment?'<div style="display:flex;gap:6px;margin-top:4px;"><span style="font-size:12px;color:var(--text2);min-width:36px;">處理</span><span style="font-size:13px;">'+treatment+'</span></div>':''}
    </div>`;
  }).join('');
}

function handleTimeSelect() {
  const sel=document.getElementById('apt-time-select').value;
  const custom=document.getElementById('apt-time-custom');
  const hidden=document.getElementById('apt-time');
  const msg=document.getElementById('add-apt-msg');
  if (sel==='other') {
    custom.style.display='block';
    custom.oninput=()=>{ hidden.value=custom.value.trim(); };
    hidden.value='';
    msg.textContent='';
  } else if (sel) {
    custom.style.display='none';
    hidden.value=sel;
    // 即時提示已滿
    const MAX_PER_SLOT = 2;
    const sameSlot = allAppointments.filter(a=>String(a.date)===selectedDate && String(a.time)===sel);
    if (sameSlot.length >= MAX_PER_SLOT) {
      msg.className='msg-err';
      msg.textContent='此時段已額滿（'+sameSlot.length+'/'+MAX_PER_SLOT+'）';
    } else if (sameSlot.length > 0) {
      msg.className='msg-ok';
      msg.textContent='此時段已有 '+sameSlot.length+' 人（還可預約 '+(MAX_PER_SLOT-sameSlot.length)+' 人）';
    } else {
      msg.textContent='';
    }
  } else {
    custom.style.display='none';
    hidden.value='';
    msg.textContent='';
  }
}

function selectAptImprove(val) {
  selectedAptImprovement=val;
  document.getElementById('apt-opt-improve').className='improve-opt'+(val==='明顯改善'?' sel-improve':'');
  document.getElementById('apt-opt-partial').className='improve-opt'+(val==='部分改善'?' sel-partial':'');
  document.getElementById('apt-opt-none').className='improve-opt'+(val==='未明顯改善'?' sel-none':'');
}

function toggleAptForm(show) {
  document.getElementById('add-apt-form').style.display=show?'block':'none';
  document.getElementById('btn-show-apt-form').style.display=show?'none':'inline-block';
  if (!show) {
    document.getElementById('add-apt-msg').textContent='';
    document.getElementById('apt-time-select').value='';
    document.getElementById('apt-time-custom').style.display='none';
    document.getElementById('apt-time').value='';
    document.getElementById('apt-gender').value='';
    document.getElementById('apt-count').value='';
    document.getElementById('apt-symptoms').value='';
    document.getElementById('apt-treatment').value='';
    selectedAptImprovement=''; selectAptImprove('');
  }
}

async function addAppointment() {
  const name=document.getElementById('apt-name').value.trim();
  const phone=document.getElementById('apt-phone').value.trim();
  const gender=document.getElementById('apt-gender').value;
  const count=document.getElementById('apt-count').value;
  const time=document.getElementById('apt-time').value;
  const note=document.getElementById('apt-note').value.trim();
  const msg=document.getElementById('add-apt-msg');
  const btn=document.getElementById('btn-add-apt');
  if (!phone) { msg.className='msg-err'; msg.textContent='電話為必填'; return; }
  if (!time) { msg.className='msg-err'; msg.textContent='請選擇或填寫預約時間'; return; }
  if (!selectedDate) { msg.className='msg-err'; msg.textContent='請先選擇日期'; return; }
  // 時段衝突檢查：同日同時段最多 2 人
  const MAX_PER_SLOT = 2;
  const sameSlot = allAppointments.filter(a => String(a.date)===selectedDate && String(a.time)===String(time));
  if (sameSlot.length >= MAX_PER_SLOT) {
    msg.className='msg-err';
    msg.textContent='此時段已額滿（最多 '+MAX_PER_SLOT+' 人），請選擇其他時間';
    return;
  }
  btn.disabled=true; btn.textContent='新增中...';
  try {
    // 自動建立新顧客
    let existing=findCustomer(phone);
    let customerId='';
    if (!existing) {
      msg.className='msg-ok'; msg.textContent='自動建立顧客資料中...';
      const cRes=await api('addCustomer',{name,phone,gender,age:'',note:''});
      if (cRes.success) {
        customerId=cRes.id;
        existing={id:cRes.id,name,phone,gender,age:'',note:''};
        customersCache.push(existing);
      }
    } else { customerId=existing.id; }

    const res=await api('addAppointment',{customerName:name,phone,date:selectedDate,time,note,customerId,gender,count:count||1});
    if (res.success) {
      allAppointments.push({id:res.id,customerName:name,phone,date:selectedDate,time,note,customerId,gender,count:count||1});
      // 若有填就診記錄則一併儲存
      const symptomsRaw=document.getElementById('apt-symptoms').value.trim();
      const treatment=document.getElementById('apt-treatment').value.trim();
      if (symptomsRaw && customerId) {
        const symptoms=symptomsRaw.split(/[，,、\n]+/).map(s=>s.trim()).filter(Boolean);
        const aptVisitTime=document.getElementById('apt-time').value||'';
        const vRes=await api('addVisit',{customerId,date:selectedDate,symptoms,treatment,improvement:selectedAptImprovement||'未填寫',note:'',time:aptVisitTime});
        if (vRes.success) visitsCache.push({id:vRes.id,customerId,date:selectedDate,symptoms,treatment,improvement:selectedAptImprovement||'未填寫',note:'',time:aptVisitTime});
      }
      const isNew=!findCustomer(phone)||customerId!==existing.id;
      msg.className='msg-ok'; msg.textContent='✓ 預約新增成功'+(isNew?' （已自動建立顧客資料）':'');
      document.getElementById('apt-name').value='';
      document.getElementById('apt-phone').value='';
      document.getElementById('apt-gender').value='';
      document.getElementById('apt-count').value='';
      document.getElementById('apt-time-select').value='';
      document.getElementById('apt-time-custom').style.display='none';
      document.getElementById('apt-time').value='';
      document.getElementById('apt-note').value='';
      document.getElementById('apt-symptoms').value='';
      document.getElementById('apt-treatment').value='';
      selectedAptImprovement=''; selectAptImprove('');
      renderAptList(); if(calView==='month') renderCalendar(); else renderWeekView();
      setTimeout(()=>toggleAptForm(false),1500);
    } else { msg.className='msg-err'; msg.textContent='新增失敗'; }
  } catch(e) { msg.className='msg-err'; msg.textContent='連線錯誤'; }
  btn.disabled=false; btn.textContent='確認新增';
}

async function deleteAppointment(id) {
  if (!confirm('確定要取消此筆預約？')) return;
  try {
    await api('deleteAppointment',{id});
    allAppointments=allAppointments.filter(a=>String(a.id)!==String(id));
    renderAptList(); if(calView==='month') renderCalendar(); else renderWeekView();
  } catch(e) { alert('刪除失敗，請再試一次'); }
}

// ===== 編輯功能 =====
let editImprovement = '';

function closeModal(id) {
  document.getElementById(id).style.display='none';
}

function openEditCustomer(customerId) {
  const c = customersCache.find(c=>String(c.id)===String(customerId));
  if (!c) return;
  document.getElementById('edit-customer-id').value = c.id;
  document.getElementById('edit-customer-name').value = c.name||'';
  document.getElementById('edit-customer-phone').value = c.phone||'';
  document.getElementById('edit-customer-gender').value = c.gender||'';
  document.getElementById('edit-customer-age').value = c.age||'';
  document.getElementById('edit-customer-note').value = c.note||'';
  document.getElementById('edit-customer-msg').textContent='';
  document.getElementById('modal-customer').style.display='flex';
}

async function saveCustomer() {
  const id = document.getElementById('edit-customer-id').value;
  const name = document.getElementById('edit-customer-name').value.trim();
  const phone = document.getElementById('edit-customer-phone').value.trim();
  const gender = document.getElementById('edit-customer-gender').value;
  const age = document.getElementById('edit-customer-age').value;
  const note = document.getElementById('edit-customer-note').value.trim();
  const msg = document.getElementById('edit-customer-msg');
  if (!phone) { msg.style.color='#a32d2d'; msg.textContent='電話為必填'; return; }
  msg.style.color='var(--text2)'; msg.textContent='儲存中...';
  try {
    const res = await api('updateCustomer', {id, name, phone, gender, age, note});
    if (res.success) {
      const idx = customersCache.findIndex(c=>String(c.id)===String(id));
      if (idx>=0) customersCache[idx] = {...customersCache[idx], name, phone, gender, age, note};
      msg.style.color='#3b6d11'; msg.textContent='✓ 儲存成功';
      setTimeout(()=>{
        closeModal('modal-customer');
        const q = document.getElementById('search-input').value.trim();
        if (q) searchCustomer();
        if (document.getElementById('tab-list').classList.contains('active')) renderAllCustomers();
      }, 800);
    } else { msg.style.color='#a32d2d'; msg.textContent='儲存失敗'; }
  } catch(e) { msg.style.color='#a32d2d'; msg.textContent='連線錯誤'; }
}

function openEditVisit(visitId) {
  const v = visitsCache.find(v=>String(v.id)===String(visitId));
  if (!v) return;
  document.getElementById('edit-visit-id').value = v.id;
  document.getElementById('edit-visit-date').value = v.date||'';
  document.getElementById('edit-visit-time').value = v.time||'';
  const syms = Array.isArray(v.symptoms)?v.symptoms:(v.symptoms?String(v.symptoms).split(','):[]);
  document.getElementById('edit-visit-symptoms').value = syms.join('、');
  document.getElementById('edit-visit-treatment').value = v.treatment||'';
  document.getElementById('edit-visit-note').value = v.note||'';
  editImprovement = v.improvement||'';
  selectEditImprove(editImprovement);
  document.getElementById('edit-visit-msg').textContent='';
  document.getElementById('modal-visit').style.display='flex';
}

function selectEditImprove(val) {
  editImprovement = val;
  document.getElementById('edit-opt-improve').className='improve-opt'+(val==='明顯改善'?' sel-improve':'');
  document.getElementById('edit-opt-partial').className='improve-opt'+(val==='部分改善'?' sel-partial':'');
  document.getElementById('edit-opt-none').className='improve-opt'+(val==='未明顯改善'?' sel-none':'');
}

async function saveVisit() {
  const id = document.getElementById('edit-visit-id').value;
  const date = document.getElementById('edit-visit-date').value;
  const time = document.getElementById('edit-visit-time').value.trim();
  const symptomsRaw = document.getElementById('edit-visit-symptoms').value.trim();
  const treatment = document.getElementById('edit-visit-treatment').value.trim();
  const note = document.getElementById('edit-visit-note').value.trim();
  const msg = document.getElementById('edit-visit-msg');
  if (!date) { msg.style.color='#a32d2d'; msg.textContent='請填寫日期'; return; }
  const symptoms = symptomsRaw.split(/[，,、\n]+/).map(s=>s.trim()).filter(Boolean);
  msg.style.color='var(--text2)'; msg.textContent='儲存中...';
  try {
    const res = await api('updateVisit', {id, date, time, symptoms, treatment, improvement: editImprovement||'未填寫', note});
    if (res.success) {
      const idx = visitsCache.findIndex(v=>String(v.id)===String(id));
      if (idx>=0) visitsCache[idx] = {...visitsCache[idx], date, time, symptoms, treatment, improvement: editImprovement||'未填寫', note};
      msg.style.color='#3b6d11'; msg.textContent='✓ 儲存成功';
      setTimeout(()=>{
        closeModal('modal-visit');
        const q = document.getElementById('search-input').value.trim();
        if (q) searchCustomer();
        if (document.getElementById('tab-list').classList.contains('active')) renderAllCustomers();
      }, 800);
    } else { msg.style.color='#a32d2d'; msg.textContent='儲存失敗'; }
  } catch(e) { msg.style.color='#a32d2d'; msg.textContent='連線錯誤'; }
}

// 啟動時載入所有資料
loadAll();
